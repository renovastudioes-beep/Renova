<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Peptide — ONYX Peptides</title>
  <meta name="description" content="High-purity research peptides for in-vitro laboratory use. HPLC verified. Research use only.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="canonical" id="canonicalLink" href="">
</head>
<body>
  <p style="text-align:center;padding:40px;font-family:system-ui">Loading product…</p>
  <script src="js/config.js"></script>
  <script src="js/products.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('p') || new URLSearchParams(location.search).get('id');
    if (id && PRODUCTS[id]) {
      const p = PRODUCTS[id];
      document.title = `${p.name} — ONYX Peptides`;
      document.querySelector('meta[name="description"]').content =
        `${p.tagline}. ${p.purity} purity. HPLC verified. Research use only.`;
      document.getElementById('canonicalLink').href = location.origin + location.pathname + '?p=' + id;
      location.replace('peptides.html?product=' + id);
    } else {
      location.replace('peptides.html');
    }
  </script>
</body>
</html>
