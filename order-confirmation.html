<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — ONYX Peptides</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-body">
  <nav class="global-nav scrolled"><div class="nav-content"><a href="index.html" class="nav-logo">ONYX</a></div></nav>
  <main class="page-main confirm-page">
    <div class="confirm-icon" id="confirmIcon">✓</div>
    <h1 id="confirmTitle">Order confirmed.</h1>
    <p class="confirm-id">Order <strong id="orderId">—</strong></p>
    <p id="confirmMsg">Thank you. A confirmation email will be sent with your COA documents and tracking once your order ships.</p>
    <p class="confirm-note" id="confirmNote">Orders placed before 2 PM EST ship same business day via cold-chain packaging.</p>
    <div class="confirm-actions">
      <a href="coa.html" class="btn-primary">COA Lookup</a>
      <a href="peptides.html" class="btn-secondary">Continue Shopping</a>
    </div>
  </main>
  <script>
    const order = JSON.parse(localStorage.getItem('renvoa-last-order') || 'null');
    const params = new URLSearchParams(location.search);
    const isQuote = order?.pricingStatus === 'pending' || order?.total == null;

    document.getElementById('orderId').textContent = params.get('id') || order?.id || '—';

    if (isQuote) {
      document.title = 'Request Received — ONYX Peptides';
      document.getElementById('confirmTitle').textContent = 'Request received.';
      document.getElementById('confirmMsg').textContent = order?.customer?.email
        ? `We've received your order request. Our team will confirm final pricing and reach out at ${order.customer.email} before fulfillment.`
        : "We've received your order request. Our team will confirm final pricing and reach out before fulfillment.";
      document.getElementById('confirmNote').textContent = 'Line-item pricing is handled privately by our team — you will not see dollar amounts on the public site until we send your quote.';
    } else if (order?.customer?.email) {
      document.getElementById('confirmMsg').textContent =
        `Confirmation sent to ${order.customer.email}. COA documents and tracking will follow when your order ships.`;
    }
  </script>
</body>
</html>
